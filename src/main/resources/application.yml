

spring:
  datasource:
     url: jdbc:postgresql://localhost:5432/reservations
     username: resauser
     password: resapass
     driver-class-name: org.postgresql.Driver
  jpa:
     hibernate:
         ddl-auto: validate
     show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration



server:
  port: 8080
  servlet:
    context-path: /reservations-api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    doc-expansion: none
    tags-sorter: alpha
  api-docs:
    path: /api-docs